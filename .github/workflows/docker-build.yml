  # --- DEPLOY JOB ---
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to web server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/flask-hello:latest
            docker stop flask-hello || true
            docker rm flask-hello || true
            docker run -d --name flask-hello -p 5000:5000 ${{ secrets.DOCKERHUB_USERNAME }}/flask-hello:latest

      - name: Send deployment result email
        if: always()   # ensures email is sent even if deploy fails
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "Deployment Status: ${{ github.workflow }} - ${{ job.status }}"
          to: team@example.com
          from: ${{ secrets.SMTP_USER }}
          body: |
            Deployment job finished.
            Status: ${{ job.status }}
            Commit: ${{ github.sha }}
            Ref: ${{ github.ref }}
