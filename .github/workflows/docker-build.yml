name: Build, Test, and Deploy

on:
  push:
    branches: [ "master", "feature/*" ] # Run tests on these branches
    tags:
      - "v*"                         # Only tags trigger Build/Deploy

jobs:
  # --- NEW TEST JOB ---
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install flask pytest pylint

      - name: Run Pylint
        run: pylint app.py --fail-under=8.0 # Fails if score is < 8

      - name: Run Pytest
        run: pytest


  # --- MODIFIED BUILD JOB ---
  build:
    runs-on: ubuntu-latest
    needs: test                     # Won't build if tests fail!
    if: startsWith(github.ref, 'refs/tags/v') # Only run for tags
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/flask-hello:latest,${{ secrets.DOCKERHUB_USERNAME }}/flask-hello:${{ github.ref_name }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to web server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/flask-hello:latest
            docker stop flask-hello || true
            docker rm flask-hello || true
            docker run -d --name flask-hello -p 5000:5000 ${{ secrets.DOCKERHUB_USERNAME }}/flask-hello:latest

      - name: Send deployment result email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "Deployment Status: ${{ github.workflow }} - ${{ job.status }}"
          to: clinton.pillay@outlook.com
          from: ${{ secrets.SMTP_USER }}
          body: |
            Deployment job finished.
            Status: ${{ job.status }}
            Commit: ${{ github.sha }}
            Ref: ${{ github.ref }}

      - name: Update Jira on success
        if: success()
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -u ${{ secrets.JIRA_USER }}:${{ secrets.JIRA_API_TOKEN }} \
            --data '{
              "update": {
                "comment": [
                  {
                    "add": {
                      "body": "✅ Deployment succeeded for issue JIRA-2 on EC2 VM. Commit: '${{ github.sha }}'"
                    }
                  }
                ]
              }
            }' \
            https://clintonbitcoin.atlassian.net/rest/api/2/issue/JIRA-2

      - name: Update Jira on failure
        if: failure()
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -u ${{ secrets.JIRA_USER }}:${{ secrets.JIRA_API_TOKEN }} \
            --data '{
              "update": {
                "comment": [
                  {
                    "add": {
                      "body": "❌ Deployment FAILED for issue JIRA-2. Commit: '${{ github.sha }}'"
                    }
                  }
                ]
              }
            }' \
            https://clintonbitcoin.atlassian.net/rest/api/2/issue/JIRA-2
